<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin | Real-Time Tracker</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        /* Ajustar el contenedor del mapa para integrarlo en flexbox */
        #map { min-height: 400px; height: 100%; width: 100%; border-radius: 0.75rem; z-index: 10; }
        /* Sombras para popups del dark mode leaflet */
        .leaflet-popup-content-wrapper, .leaflet-popup-tip {
            background: #1e293b;
            color: #f8fafc;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex flex-col font-sans">

    <!-- Header / Navbar -->
    <header class="bg-gray-800 border-b border-gray-700 p-4 shadow-md flex justify-between items-center z-20 relative">
        <div class="flex items-center gap-3">
            <div class="h-8 w-8 rounded-full bg-blue-500 flex items-center justify-center shadow-lg shadow-blue-500/50">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 22s-8-4.5-8-11.8A8 8 0 0112 2a8 8 0 018 8.2c0 7.3-8 11.8-8 11.8z"></path><circle cx="12" cy="10" r="3"></circle></svg>
            </div>
            <h1 class="text-xl font-bold tracking-wider">TRACKER<span class="text-blue-500">ADMIN</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2">
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                </span>
                <span class="text-sm font-medium text-gray-400">Sistema en línea</span>
            </div>
        </div>
    </header>

    <!-- Contenido (Mapa) -->
    <main class="flex-1 p-4 flex flex-col lg:flex-row gap-4">
        
        <!-- Contenedor del Mapa -->
        <div class="flex-1 flex flex-col bg-gray-800 rounded-xl border border-gray-700 p-2 shadow-2xl relative overflow-hidden">
            <div id="map"></div>
        </div>

        <!-- Sidebar / Eventos Opcional -->
        <div class="w-full lg:w-80 bg-gray-800 rounded-xl border border-gray-700 p-4 flex flex-col shadow-2xl overflow-y-auto">
            <h2 class="text-lg font-semibold border-b border-gray-700 pb-2 mb-4">Dispositivos Activos</h2>
            <div id="device-list" class="flex flex-col gap-3">
                <p class="text-sm text-gray-500 italic">Esperando conexiones...</p>
            </div>
        </div>

    </main>

    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // ========================================================
        // CONFIGURACIÓN SUPABASE - INTRODUCE TUS CREDENCIALES AQUÍ
        // ========================================================
        const SUPABASE_URL = 'https://wzoisjxppwxwuorlbdxe.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6b2lzanhwcHd4d3VvcmxiZHhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMjkzNDksImV4cCI6MjA4ODkwNTM0OX0.XRExCFt2Whs8h_itf2OOIFI1_1MINkcnfA7npDy3SEQ';
        // ========================================================

        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Inicializar Mapa estilo Dark Mode
        const map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // Objeto para almacenar referencias de marcadores y datos
        const activeDevices = {};

        // Icono personalizado para los marcadores
        const customIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        // Actualizar UI del panel lateral
        function renderDeviceList() {
            const listEl = document.getElementById('device-list');
            listEl.innerHTML = '';
            
            const devicesArray = Object.values(activeDevices);
            if(devicesArray.length === 0) {
                listEl.innerHTML = '<p class="text-sm text-gray-500 italic">No hay dispositivos rastreados.</p>';
            }

            devicesArray.forEach(dev => {
                const timeStr = new Date(dev.ultima_actualizacion).toLocaleTimeString();
                
                // Extraer meta_datos si existen
                let deviceInfo = ``;
                if(dev.meta_datos && dev.meta_datos.userAgent) {
                    const p = String(dev.meta_datos.platform).toLowerCase();
                    const ua = String(dev.meta_datos.userAgent).toLowerCase();
                    const emoji = (p.includes('iphone') || p.includes('ipad') || p.includes('mac') || ua.includes('iphone') || ua.includes('mac')) ? '🍏' : ((p.includes('android') || p.includes('linux') || ua.includes('android')) ? '🤖' : '💻');
                    
                    deviceInfo = `
                        <details class="mt-2 w-full group overflow-hidden">
                            <summary class="text-xs text-blue-400 cursor-pointer hover:text-blue-300 focus:outline-none list-none font-medium flex items-center justify-between">
                                <span>${emoji} Ver Info Técnica...</span>
                                <span class="group-open:rotate-180 transition-transform">▼</span>
                            </summary>
                            <div class="mt-2 text-[0.65rem] text-gray-300 bg-gray-800/80 rounded p-2 border border-gray-600 shadow-inner">
                                <ul class="space-y-1.5 break-words">
                                    <li><strong class="text-gray-400">Sis. Op.:</strong> ${dev.meta_datos.platform} / ${dev.meta_datos.vendor || 'N/A'}</li>
                                    <li><strong class="text-gray-400">User Agent:</strong> <span class="text-gray-500">${dev.meta_datos.userAgent}</span></li>
                                    <li><strong class="text-gray-400">Red:</strong> ${dev.meta_datos.connection || 'Desconocida'}</li>
                                    <li><strong class="text-gray-400">Hardware:</strong> CPU: ${dev.meta_datos.hardwareConcurrency} núcleos | RAM: ~${dev.meta_datos.deviceMemory}GB</li>
                                    <li><strong class="text-gray-400">Pantallas:</strong> Monitor: ${dev.meta_datos.screenResolution} (Color: ${dev.meta_datos.colorDepth}bit) | Ventana: ${dev.meta_datos.windowSize}</li>
                                    <li><strong class="text-gray-400">Táctil:</strong> ${dev.meta_datos.maxTouchPoints > 0 ? `Sí, ${dev.meta_datos.maxTouchPoints} pts` : 'No'}</li>
                                    <li><strong class="text-gray-400">Zona Horaria:</strong> ${dev.meta_datos.timeZone} | Idioma: ${dev.meta_datos.language}</li>
                                    <li><strong class="text-gray-400">Hora Local:</strong> ${dev.meta_datos.timestampLocal || 'N/A'}</li>
                                </ul>
                            </div>
                        </details>
                    `;
                }
                
                // Indicar si solo es la visita (lat/lon 0)
                const locationState = (dev.latitud === 0 && dev.longitud === 0) 
                    ? '<span class="text-xs text-yellow-500 mt-1 font-medium">⏳ Esperando GPS...</span>'
                    : `<span class="text-xs text-gray-400 mt-1"><svg class="w-3 h-3 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>${timeStr}</span>`;

                const card = document.createElement('div');
                card.className = "bg-gray-700/50 p-3 rounded-lg flex items-center justify-between border border-gray-600 hover:border-blue-500 transition-colors cursor-pointer";
                if(dev.latitud !== 0) card.onclick = () => map.flyTo([dev.latitud, dev.longitud], 17);
                
                card.innerHTML = `
                    <div class="flex flex-col w-full overflow-hidden">
                        <span class="font-medium text-blue-400 truncate">${dev.dispositivo}</span>
                        ${locationState}
                        ${deviceInfo}
                    </div>
                `;
                listEl.appendChild(card);
            });
        }

        // Crear o actualizar un marcador en el mapa
        function upsertMarker(locationData) {
            const { id, latitud, longitud, dispositivo, ultima_actualizacion, meta_datos } = locationData;
            
            // Si la ubicación es 0,0, solo guardamos en activeDevices para la lista, no pintamos marcador real en el mapa (o en [0,0])
            const isValidLocation = latitud !== 0 && longitud !== 0;

            if (activeDevices[id] && activeDevices[id].marker && isValidLocation) {
                // Mover marcador existente sin recargar
                activeDevices[id].marker.setLatLng([latitud, longitud]);
                const timeStr = new Date(ultima_actualizacion).toLocaleTimeString();
                
                let extraInfo = '';
                if(meta_datos && meta_datos.platform) extraInfo = `<br><span class="text-[0.65rem] text-gray-500">${meta_datos.platform}</span>`;
                
                activeDevices[id].marker.getPopup().setContent(`
                    <strong class="text-lg text-blue-400">${dispositivo}</strong><br>
                    <span class="text-xs text-gray-400">Última act: ${timeStr}</span>${extraInfo}
                `);
            } else if (isValidLocation) {
                // Crear nuevo marcador solo si no es [0,0]
                const timeStr = new Date(ultima_actualizacion).toLocaleTimeString();
                
                let extraInfo = '';
                if(meta_datos && meta_datos.platform) extraInfo = `<br><span class="text-[0.65rem] text-gray-500">${meta_datos.platform}</span>`;

                const marker = L.marker([latitud, longitud], { icon: customIcon }).addTo(map);
                marker.bindPopup(`
                    <strong class="text-lg text-blue-400">${dispositivo}</strong><br>
                    <span class="text-xs text-gray-400">Última act: ${timeStr}</span>${extraInfo}
                `);
                
                // Centrar el mapa en la primera ubicación real recibida
                if(Object.keys(activeDevices).length === 0 || !activeDevices[id] || (activeDevices[id] && !activeDevices[id].marker)) {
                    map.setView([latitud, longitud], 16);
                }
                
                if(!activeDevices[id]) activeDevices[id] = {};
                activeDevices[id].marker = marker;
            }

            // Actualizar datos almacenados localmente incluyendo metadatos
            activeDevices[id] = { ...activeDevices[id], latitud, longitud, dispositivo, ultima_actualizacion, meta_datos };
            
            renderDeviceList();
        }

        // 1. Obtener datos iniciales de los dispositivos actuales
        async function fetchInitialLocations() {
            const { data, error } = await supabaseClient.from('ubicaciones').select('*');
            if (error) {
                console.error("Error cargando ubicaciones iniciales:", error);
                return;
            }
            data.forEach(loc => upsertMarker(loc));
        }

        // 2. Suscribirse a cambios en Realtime
        supabaseClient
            .channel('ubicaciones-realtime')
            .on(
                'postgres_changes', 
                { event: '*', schema: 'public', table: 'ubicaciones' }, 
                (payload) => {
                    // payload.new incluye la nueva fila insertada o actualizada
                    if (payload.new && payload.new.id) {
                        upsertMarker(payload.new);
                    }
                }
            )
            .subscribe((status) => {
                if(status === 'SUBSCRIBED') {
                    console.log('Suscripción Realtime activa');
                }
            });

        // Iniciar carga
        fetchInitialLocations();

    </script>
</body>
</html>
